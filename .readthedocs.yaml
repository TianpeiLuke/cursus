# Read the Docs build configuration for the Cursus documentation.
# Docs: https://docs.readthedocs.io/en/stable/config-file/v2.html
#
# Hosting: connect this repo at https://app.readthedocs.org (dashboard -> "Add project"),
# and RTD builds the docs on every push/tag via webhook. `stable` tracks the newest SemVer
# tag; `latest` tracks `main`. No secrets required for a public repo.
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"

sphinx:
  configuration: docs/conf.py
  # Keep false until the docstring-warning backlog is triaged, then tighten to fail on new warnings.
  fail_on_warning: false

# Install the package + its docs extra so autosummary/sphinx-click can import `cursus`
# and the builder-inited generator can read the live registry / interfaces / catalog.
python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs

# HTML only. (PDF/epub add a LaTeX build that commonly fails on large auto-generated API
# docs even when HTML is green, and it roughly doubles build time/memory. Re-enable with
# `formats: [pdf]` only if you specifically need downloadable builds.)
formats: []
