step_type: XGBoostModelInference
node_type: internal
contract:
  entry_point: xgboost_model_inference.py
  inputs:
    model_input:
      path: /opt/ml/processing/input/model
      required: true
    processed_data:
      path: /opt/ml/processing/input/eval_data
      required: true
  outputs:
    eval_output:
      path: /opt/ml/processing/output/eval
  arguments: {}
  env_vars:
    required:
    - ID_FIELD
    - LABEL_FIELD
    optional:
      OUTPUT_FORMAT: csv
      JSON_ORIENT: records
  framework_requirements:
    pandas: '>=1.3.0'
    numpy: '>=1.21.0'
    xgboost: '>=1.6.0'
  description: 'XGBoost model inference script. Loads trained model, preprocesses
    evaluation data, generates predictions without metrics computation.

    '
spec:
  dependencies:
    model_input:
      type: model_artifacts
      required: true
      compatible_sources:
      - XGBoostTraining
      - PyTorchTraining
      - DummyTraining
      - XGBoostModel
      - PyTorchModel
      semantic_keywords:
      - model
      - artifacts
      - trained
      - output
      - ModelArtifacts
      - xgboost
      - training
    processed_data:
      type: processing_output
      required: true
      compatible_sources:
      - TabularPreprocessing
      - CradleDataLoading
      - RiskTableMapping
      - CurrencyConversion
      semantic_keywords:
      - data
      - evaluation
      - calibration
      - validation
      - test
      - processed
      - inference
      - input
  outputs:
    eval_output:
      type: processing_output
      property_path: properties.ProcessingOutputConfig.Outputs['eval_output'].S3Output.S3Uri
      semantic_keywords:
      - inference
      - predictions
      - model_predictions
      aliases:
      - inference_output
      - predictions
      - model_predictions
      - inference_results
      - prediction_data
      - evaluation_data
      data_type: S3Uri
