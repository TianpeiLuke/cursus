step_type: SlipboxKnowledgeRouting
node_type: internal
registry:
  sagemaker_step_type: Processing
  description: Slipbox knowledge routing step that hosts the DKS knowledge+ruleset corpus and runs compile→index→route internally, emitting a compiled prompt ruleset plus per-record routed rule names and routing confidence for downstream Bedrock processing
patterns:
  step_assembly: step_args
  direct_input_keys: [records]
compute:
  kind: framework
  sdk_class: PyTorch
  framework_version_field: framework_version
  py_version_field: py_version
contract:
  entry_point: slipbox_knowledge_routing.py
  source_dir: true
  # knowledge_corpus + embedding_model are BUNDLED in the source_dir and loaded internally by the
  # script — declared here for documentation but listed under skip_inputs so the builder does NOT
  # mount them and the dependency resolver does NOT wire them (the same pattern
  # PercentileModelCalibration uses for its bundled calibration_config). This is the
  # use_bundled_corpus=True (default) mode; only `records` is a real external input. It also removes
  # the bug where all three inputs resolved to the SAME TabularPreprocessing output.
  skip_inputs:
  - knowledge_corpus
  - embedding_model
  inputs:
    records:
      path: /opt/ml/processing/input/data
      required: true
    knowledge_corpus:
      # bundled under the source_dir (/opt/ml/code/…), resolved from __file__ by the script
      path: /opt/ml/code/slipbox_knowledge
      required: false
    embedding_model:
      # bundled offline encoder under the source_dir (optional external override)
      path: /opt/ml/code/embedding_model
      required: false
  outputs:
    prompt_ruleset:
      path: /opt/ml/processing/output/ruleset
    routed_records:
      path: /opt/ml/processing/output/data
  arguments: {}
  job_arguments:
  - flag: --job_type
    source: job_type
  env_vars:
    required: []
    optional:
      ROUTING_SCORING_MODE: activation
      ROUTING_THRESHOLD: '0.30'
      ROUTING_TOP_K: '7'
      EMBEDDING_MODEL_NAME: all-MiniLM-L6-v2
  framework_requirements:
    boto3: '>=1.34'
    pandas: '>=2.0'
    pyarrow: '>=15.0'
    pyyaml: '>=6.0'
    sentence-transformers: '>=3.0'
    numpy: '>=1.26'
  description: 'Slipbox knowledge routing script that COMPILES the DKS rule_*.md corpus
    into an in-memory prompt ruleset (prompts.json + tool schema), INDEXES the
    pattern_*/behavior_* corpus with an offline SentenceTransformer encoder into an
    in-memory routing index, and ROUTES each input record via cosine similarity +
    activation top-k to a set of routed rule names with a routing_confidence score.
    An internal consistency gate asserts the index linked_rules are a subset of the
    compiled rule_names. Emits the prompt_ruleset and the routed_records for
    downstream BedrockProcessing.

    '
spec:
  dependencies:
    records:
      type: processing_output
      required: true
      compatible_sources:
      - TabularPreprocessing
      - CradleDataLoading
      - ProcessingStep
      semantic_keywords:
      - data
      - records
      - input
      - dataset
      - processed_data
      - tabular
      - source
    knowledge_corpus:
      # BUNDLED (skip_inputs) — declared for documentation only; not mounted, not resolved.
      # type=custom_property (NOT processing_output) so it structurally CANNOT score the type-match
      # against a TabularPreprocessing processing_output — even in an external-override run it can
      # never bind to the same TP output as `records`. compatible_sources also restricted to a
      # dedicated corpus-producing DummyDataLoading step.
      type: custom_property
      required: false
      compatible_sources:
      - DummyDataLoading
      semantic_keywords:
      - knowledge
      - corpus
      - rules
      - ruleset
      - patterns
      - behaviors
      - dks
    embedding_model:
      # BUNDLED (skip_inputs) — declared for documentation only; not mounted, not resolved.
      # type=model_artifacts (not processing_output) + non-generic sources so it can never bind to
      # the `records`/TabularPreprocessing output; a real external encoder would come from a
      # dedicated model-artifact step if bundled mode is ever turned off.
      type: model_artifacts
      required: false
      compatible_sources:
      - PyTorchModel
      - TokenizerTraining
      semantic_keywords:
      - embedding_model
      - sentence_transformer
      - encoder_weights
      - minilm
  outputs:
    prompt_ruleset:
      type: processing_output
      property_path: properties.ProcessingOutputConfig.Outputs['prompt_ruleset'].S3Output.S3Uri
      semantic_keywords:
      - ruleset
      - prompt
      - prompts
      - tool_schema
      - compiled_rules
      aliases:
      - prompt_templates
      - prompts
      - ruleset
      - templates
      data_type: S3Uri
    routed_records:
      type: processing_output
      property_path: properties.ProcessingOutputConfig.Outputs['routed_records'].S3Output.S3Uri
      semantic_keywords:
      - routed
      - records
      - routed_records
      - routing_confidence
      - processed_data
      - data
      aliases:
      - input_data
      - processed_data
      - data
      - input_path
      - model_input_data
      data_type: S3Uri
