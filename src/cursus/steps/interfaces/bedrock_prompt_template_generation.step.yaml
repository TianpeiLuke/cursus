step_type: BedrockPromptTemplateGeneration
node_type: internal
registry:
  sagemaker_step_type: Processing
  description: Bedrock prompt template generation step that assembles the prompt-config bundle (system prompt, category rules, output schema) into ONE standardized prompts.json prompt ruleset ({ruleset, rules} shape) with the output schema embedded in the prompt — the same contract the knowledge-routing producer emits, consumed by the Bedrock processing steps
compute:
  kind: sklearn
  framework_version_field: processing_framework_version
  framework_version_default: 1.2-1
contract:
  input_source_overrides:
    prompt_configs: resolved_prompt_configs_path
  include_job_type_in_path: false
  entry_point: bedrock_prompt_template_generation.py
  inputs:
    prompt_configs:
      path: /opt/ml/processing/input/prompt_configs
      required: false
  outputs:
    prompt_templates:
      path: /opt/ml/processing/output/templates
    template_metadata:
      path: /opt/ml/processing/output/metadata
  arguments:
    include-examples: boolean flag to include examples in template
    template-version: template version identifier
  job_arguments:
  - flag: --include-examples
    source: include_examples
  - flag: --template-version
    source: template_version
  env_vars:
    required: []
    optional:
      TEMPLATE_TASK_TYPE: classification
      TEMPLATE_STYLE: structured
      VALIDATION_LEVEL: standard
      INPUT_PLACEHOLDERS: '["input_data"]'
      INCLUDE_EXAMPLES: 'false'
      TEMPLATE_VERSION: '1.0'
  framework_requirements:
    pydantic: '>=2.0.0'
    boto3: '>=1.26.0'
  description: 'Bedrock prompt template generation script. Assembles the prompt-config
    bundle into ONE prompts.json prompt ruleset ({ruleset, rules}) with the output schema
    embedded in the prompt; a declarative meta-prompt assembler (validate blanks -> assemble),
    same downstream contract as the knowledge-routing producer.

    '
spec:
  dependencies:
    prompt_configs:
      type: processing_output
      required: false
      compatible_sources:
      - PromptConfiguration
      - ProcessingStep
      semantic_keywords:
      - prompt_configs
      - prompt_configuration
      - bedrock_configs
      - template_configs
      - classification_config
  outputs:
    prompt_templates:
      type: processing_output
      property_path: properties.ProcessingOutputConfig.Outputs['prompt_templates'].S3Output.S3Uri
      semantic_keywords:
      - templates
      - prompts
      - bedrock_templates
      aliases:
      - templates
      - bedrock_templates
      - prompt_template
      - generated_templates
      - classification_templates
      - llm_templates
      data_type: S3Uri
    template_metadata:
      type: processing_output
      property_path: properties.ProcessingOutputConfig.Outputs['template_metadata'].S3Output.S3Uri
      semantic_keywords:
      - metadata
      - generation_metadata
      - template_info
      aliases:
      - metadata
      - generation_metadata
      - template_info
      - validation_results
      - quality_metrics
      - generation_results
      data_type: S3Uri
