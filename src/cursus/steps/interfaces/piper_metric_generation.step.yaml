step_type: PiperMetricGeneration
node_type: internal
registry:
  sagemaker_step_type: Processing
  description: PIPER metric generation step; recomputes ROC/PR curves and emits PIPER
    .metric + paired data CSVs flat to the output root for PIPER rendering
compute:
  kind: sklearn
  framework_version_field: processing_framework_version
  framework_version_default: 1.2-1
contract:
  circular_ref_check: true
  include_job_type_in_path: false
  # PIPER scans <pipeline>/Model_Metric_Generation_Step/ for .metric files, so the output S3 prefix
  # segment must be this fixed literal (not the derived canonical_to_snake 'piper_metric_generation').
  output_path_token: Model_Metric_Generation_Step
  entry_point: piper_metric_generation.py
  inputs:
    eval_output:
      path: /opt/ml/processing/input/eval_data
      required: true
  outputs:
    metric_output:
      path: /opt/ml/processing/output
  arguments: {}
  job_arguments:
  - flag: --job_type
    source: job_type
  env_vars:
    required: []
    optional:
      ID_FIELD: id
      LABEL_FIELD: label
      SCORE_FIELD: ''
      SCORE_FIELDS: ''
      TASK_LABEL_NAMES: ''
      AMOUNT_FIELD: ''
      INPUT_FORMAT: auto
      COMPUTE_DOLLAR_RECALL: 'true'
      COMPUTE_COUNT_RECALL: 'true'
      DOLLAR_RECALL_FPR: '0.1'
      COUNT_RECALL_CUTOFF: '0.1'
      GENERATE_PLOTS: 'true'
      COMPARISON_MODE: 'false'
      PREVIOUS_SCORE_FIELD: ''
      PREVIOUS_SCORE_FIELDS: ''
      COMPARISON_METRICS: all
      STATISTICAL_TESTS: 'true'
      COMPARISON_PLOTS: 'true'
      VARIANT_MODEL_ID: ''
      CONTROL_MODEL_ID: ''
      PIPELINE_NAME: ''
      DATASET_TYPE: Validation
      METRICS_TO_RENDER: auc_roc,auc_pr,data_statistics
  framework_requirements:
    pandas: '>=1.3.0'
    numpy: '>=1.21.0'
    scikit-learn: '>=1.0.0'
  description: 'PIPER metric generation script. Loads prediction data, recomputes ROC
    and PR curves, and emits PIPER .metric JSON files with paired 2-column data CSVs
    written flat to the output root for PIPER rendering.

    '
spec:
  dependencies:
    eval_output:
      type: processing_output
      required: true
      compatible_sources:
      - XGBoostModelInference
      - XGBoostModelEval
      - LightGBMMTModelInference
      - LightGBMModelInference
      - PyTorchModelInference
      - TabularPreprocessing
      - CradleDataLoading
      - RiskTableMapping
      - CurrencyConversion
      semantic_keywords:
      - predictions
      - inference
      - evaluation
      - results
      - data
      - processed
      - eval_output
      - prediction_data
      - metrics_input
  outputs:
    metric_output:
      type: processing_output
      property_path: properties.ProcessingOutputConfig.Outputs['metric_output'].S3Output.S3Uri
      semantic_keywords:
      - metrics
      - performance_metrics
      - evaluation_metrics
      - piper_metrics
      - model_metrics
      aliases:
      - metrics
      - performance_metrics
      - evaluation_metrics
      - piper_metrics
      - model_metrics
      data_type: S3Uri
