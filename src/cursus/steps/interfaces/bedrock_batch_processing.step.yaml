step_type: BedrockBatchProcessing
node_type: internal
registry:
  sagemaker_step_type: Processing
  description: Bedrock batch processing step that provides AWS Bedrock batch inference capabilities with automatic fallback to real-time processing for cost-efficient large dataset processing
patterns:
  step_assembly: step_args
  include_job_type_in_path: false
compute:
  kind: framework
  sdk_class: PyTorch
  framework_version_field: framework_version
  py_version_field: py_version
contract:
  entry_point: bedrock_batch_processing.py
  inputs:
    input_data:
      path: /opt/ml/processing/input/data
      required: true
    prompt_templates:
      path: /opt/ml/processing/input/templates
      required: true
    validation_schema:
      path: /opt/ml/processing/input/schema
      required: true
  outputs:
    processed_data:
      path: /opt/ml/processing/output/data
    analysis_summary:
      path: /opt/ml/processing/output/summary
  arguments:
    batch-size: 'batch size for processing (default: 10)'
    max-retries: 'maximum retries for Bedrock calls (default: 3)'
  job_arguments:
  - flag: --job_type
    source: job_type
  - flag: --batch-size
    source: bedrock_batch_size
  - flag: --max-retries
    source: bedrock_max_retries
  env_vars:
    required:
    - BEDROCK_PRIMARY_MODEL_ID
    optional:
      BEDROCK_FALLBACK_MODEL_ID: ''
      BEDROCK_MAX_TOKENS: '32768'
      BEDROCK_BATCH_SIZE: '10'
      BEDROCK_CONCURRENCY_MODE: sequential
      BEDROCK_INFERENCE_PROFILE_ARN: ''
      BEDROCK_INFERENCE_PROFILE_REQUIRED_MODELS: '[]'
      BEDROCK_TEMPERATURE: '1.0'
      BEDROCK_TOP_P: '0.999'
      BEDROCK_MAX_RETRIES: '3'
      BEDROCK_OUTPUT_COLUMN_PREFIX: llm_
      BEDROCK_SKIP_ERROR_RECORDS: 'false'
      BEDROCK_MAX_CONCURRENT_WORKERS: '5'
      BEDROCK_RATE_LIMIT_PER_SECOND: '10'
      BEDROCK_BATCH_MODE: auto
      BEDROCK_BATCH_THRESHOLD: '1000'
      BEDROCK_BATCH_ROLE_ARN: ''
      BEDROCK_BATCH_TIMEOUT_HOURS: '24'
      BEDROCK_MAX_RECORDS_PER_JOB: '45000'
      BEDROCK_MAX_CONCURRENT_BATCH_JOBS: '20'
      BEDROCK_MAX_INPUT_FIELD_LENGTH: '400000'
      BEDROCK_TRUNCATION_ENABLED: 'true'
      BEDROCK_LOG_TRUNCATIONS: 'true'
  # COMPUTED-S3-ENV pattern (FZ 31e1d3g3 A3): the script reads/writes batch JSONL via S3 paths whose
  # value is derived from the pipeline execution prefix (base_output_path), not a config field. The
  # base _get_environment_variables sets each to Join(base_output_path, *segments) — replacing the
  # former hand-written _get_environment_variables override.
  computed_env_paths:
    BEDROCK_BATCH_INPUT_S3_PATH: [bedrock-batch, input]
    BEDROCK_BATCH_OUTPUT_S3_PATH: [bedrock-batch, output]
  framework_requirements:
    pandas: '>=1.2.0'
    boto3: '>=1.26.0'
    pydantic: '>=2.0.0'
    tenacity: '>=8.0.0'
  description: 'Bedrock batch processing script with batch inference and automatic
    fallback to real-time. Integrates with prompt templates and validation schemas
    from BedrockPromptTemplateGeneration.

    '
spec:
  dependencies:
    input_data:
      type: processing_output
      required: true
      compatible_sources:
      - DummyDataLoading
      - CradleDataLoading
      - TabularPreprocessing
      - TemporalSequenceNormalization
      - TemporalFeatureEngineering
      - StratifiedSampling
      - MissingValueImputation
      - FeatureSelection
      - CurrencyConversion
      - SlipboxKnowledgeRouting
      semantic_keywords:
      - data
      - dataset
      - input
      - processed_data
      - features
    prompt_templates:
      type: processing_output
      required: true
      compatible_sources:
      - BedrockPromptTemplateGeneration
      - SlipboxKnowledgeRouting
      semantic_keywords:
      - templates
      - prompts
      - prompt_templates
      - bedrock_templates
    validation_schema:
      type: processing_output
      required: true
      compatible_sources:
      - BedrockPromptTemplateGeneration
      - SlipboxKnowledgeRouting
      semantic_keywords:
      - schema
      - validation
      - validation_schema
      - response_schema
  outputs:
    processed_data:
      type: processing_output
      property_path: properties.ProcessingOutputConfig.Outputs['processed_data'].S3Output.S3Uri
      semantic_keywords:
      - processed
      - bedrock_output
      - model_input_data
      aliases:
      - input_path
      - training_data
      - model_input_data
      - input_data
      data_type: S3Uri
    analysis_summary:
      type: processing_output
      property_path: properties.ProcessingOutputConfig.Outputs['analysis_summary'].S3Output.S3Uri
      semantic_keywords:
      - summary
      - statistics
      - analysis
      data_type: S3Uri
