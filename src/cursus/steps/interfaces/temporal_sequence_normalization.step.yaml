          - time_series
      outputs:
        normalized_sequences:
          type: processing_output
          property_path: properties.ProcessingOutputConfig.Outputs['normalized_sequences'].S3Output.S3Uri
          aliases:
          - sequences
          - temporal_data
          - sequence_data
          - normalized_data
          - processed_sequences
          - testing_sequences
          data_type: S3Uri
  calibration:
    step_type: TemporalSequenceNormalization_Calibration
    spec:
      dependencies:
        DATA:
          semantic_keywords:
          - calibration
          - calib
          - data
          - input
          - temporal
          - sequence
          - time_series
      outputs:
        normalized_sequences:
          type: processing_output
          property_path: properties.ProcessingOutputConfig.Outputs['normalized_sequences'].S3Output.S3Uri
          aliases:
          - sequences
          - temporal_data
          - sequence_data
          - normalized_data
          - processed_sequences
          - calibration_sequences
          data_type: S3Uri
