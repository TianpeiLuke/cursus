step_type: ModelWikiGenerator
node_type: internal
registry:
  sagemaker_step_type: Processing
  description: Model wiki generator step for automated documentation creation
compute:
  kind: sklearn
  framework_version_field: processing_framework_version
  framework_version_default: 1.2-1
contract:
  circular_ref_check: true
  include_job_type_in_path: false
  entry_point: model_wiki_generator.py
  inputs:
    metrics_output:
      path: /opt/ml/processing/input/metrics
      required: true
    plots_output:
      path: /opt/ml/processing/input/plots
      required: false
  outputs:
    wiki_output:
      path: /opt/ml/processing/output/wiki
  arguments: {}
  env_vars:
    required:
    - MODEL_NAME
    optional:
      MODEL_USE_CASE: Machine Learning Model
      MODEL_VERSION: '1.0'
      PIPELINE_NAME: ML Pipeline
      AUTHOR: ML Team
      TEAM_ALIAS: ml-team@
      CONTACT_EMAIL: ml-team@company.com
      CTI_CLASSIFICATION: Internal
      REGION: Global
      OUTPUT_FORMATS: wiki,html,markdown
      INCLUDE_TECHNICAL_DETAILS: 'true'
      MODEL_DESCRIPTION: ''
      MODEL_PURPOSE: perform classification tasks
  framework_requirements:
    jinja2: '>=3.0.0'
    pandas: '>=1.3.0'
  description: 'Model wiki generator script. Loads metrics and visualizations, generates
    comprehensive multi-format model documentation (Wiki, HTML, Markdown).

    '
spec:
  dependencies:
    metrics_output:
      type: processing_output
      required: true
      compatible_sources:
      - ModelMetricsComputation
      - XGBoostModelEval
      - XGBoostModelInference
      - PyTorchModelInference
      semantic_keywords:
      - metrics
      - performance
      - evaluation
      - results
      - metrics_output
      - performance_metrics
      - evaluation_metrics
    plots_output:
      type: processing_output
      required: false
      compatible_sources:
      - ModelMetricsComputation
      - XGBoostModelEval
      - XGBoostModelInference
      - PyTorchModelInference
      semantic_keywords:
      - plots
      - visualizations
      - charts
      - graphs
      - plots_output
      - performance_plots
      - roc_curves
  outputs:
    wiki_output:
      type: processing_output
      property_path: properties.ProcessingOutputConfig.Outputs['wiki_output'].S3Output.S3Uri
      semantic_keywords:
      - documentation
      - wiki
      - model_documentation
      aliases:
      - documentation
      - wiki
      - model_documentation
      - wiki_documentation
      - documentation_output
      - model_wiki
      - generated_docs
      - wiki_pages
      data_type: S3Uri
