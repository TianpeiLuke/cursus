step_type: RiskTableMapping
node_type: internal
registry:
  sagemaker_step_type: Processing
  description: Risk table mapping step for categorical features
patterns:
  step_assembly: step_args
  direct_input_keys: [data_input, config_input, risk_tables]
compute:
  kind: framework
  sdk_class: SKLearn
  framework_version_field: processing_framework_version
contract:
  entry_point: risk_table_mapping.py
  source_dir: true
  inputs:
    input_data:
      path: /opt/ml/processing/input/data
      required: true
    hyperparameters_s3_uri:
      path: /opt/ml/code/hyperparams
      required: false
    model_artifacts_input:
      path: /opt/ml/processing/input/model_artifacts
      required: false
  outputs:
    processed_data:
      path: /opt/ml/processing/output/data
    model_artifacts_output:
      path: /opt/ml/processing/output/model_artifacts
  arguments: {}
  job_arguments:
  - flag: --job_type
    source: job_type
  env_vars:
    required: []
    optional: {}
  framework_requirements:
    pandas: '>=1.3.0'
    numpy: '>=1.21.0'
    scikit-learn: '>=1.0.0'
  description: 'Risk table mapping script. Creates risk tables for categorical features
    and handles missing value imputation for numeric features. Training mode creates
    tables; inference applies.

    '
spec:
  dependencies:
    input_data:
      type: processing_output
      required: true
      compatible_sources:
      - TabularPreprocessing
      - MissingValueImputation
      - ProcessingStep
      semantic_keywords:
      - data
      - input
      - preprocessed
      - tabular
      - processed_data
    hyperparameters_s3_uri:
      type: hyperparameters
      required: false
      compatible_sources:
      - HyperparameterPrep
      - ProcessingStep
      - ConfigurationStep
      semantic_keywords:
      - config
      - params
      - hyperparameters
      - settings
    model_artifacts_input:
      type: processing_output
      required: false
      compatible_sources:
      - RiskTableMapping_Training
      - ProcessingStep
      semantic_keywords:
      - risk_tables
      - bin_mapping
      - categorical_mappings
      - model_artifacts
  outputs:
    processed_data:
      type: processing_output
      property_path: properties.ProcessingOutputConfig.Outputs['processed_data'].S3Output.S3Uri
      semantic_keywords:
      - processed
      - risk_mapped
      - model_input_data
      aliases:
      - training_data
      - model_input_data
      - data_input
      - input_data
      - input_path
      data_type: S3Uri
    model_artifacts_output:
      type: processing_output
      property_path: properties.ProcessingOutputConfig.Outputs['model_artifacts_output'].S3Output.S3Uri
      semantic_keywords:
      - risk_tables
      - bin_mapping
      - categorical_mappings
      aliases:
      - risk_tables
      - bin_mapping
      - risk_table_artifacts
      - categorical_mappings
      - risk_tables_input
      - model_artifacts_input
      data_type: S3Uri
variants:
  training:
    step_type: RiskTableMapping_Training
    spec:
      dependencies:
        input_data:
          semantic_keywords:
          - training
          - train
          - data
          - input
          - preprocessed
          - tabular
          - processed_data
        model_artifacts_input:
          required: false
      outputs:
        processed_data:
          type: processing_output
          property_path: properties.ProcessingOutputConfig.Outputs['processed_data'].S3Output.S3Uri
          aliases:
          - training_data
          - model_input_data
          - data_input
          - input_data
          - input_path
          data_type: S3Uri
        model_artifacts_output:
          type: processing_output
          property_path: properties.ProcessingOutputConfig.Outputs['model_artifacts_output'].S3Output.S3Uri
          aliases:
          - risk_tables
          - bin_mapping
          - risk_table_artifacts
          - categorical_mappings
          - risk_tables_input
          - model_artifacts_input
          data_type: S3Uri
  validation:
    step_type: RiskTableMapping_Validation
    spec:
      dependencies:
        input_data:
          semantic_keywords:
          - validation
          - val
          - data
          - input
          - preprocessed
          - tabular
          - processed_data
        model_artifacts_input:
          required: true
          compatible_sources:
          - RiskTableMapping_Training
      outputs:
        processed_data:
          type: processing_output
          property_path: properties.ProcessingOutputConfig.Outputs['processed_data'].S3Output.S3Uri
          aliases:
          - validation_data
          - model_validation_data
          - data_input
          - input_data
          - input_path
          data_type: S3Uri
        model_artifacts_output:
          type: processing_output
          property_path: properties.ProcessingOutputConfig.Outputs['model_artifacts_output'].S3Output.S3Uri
          aliases:
          - risk_tables
          - bin_mapping
          - risk_table_artifacts
          - categorical_mappings
          - risk_tables_input
          - model_artifacts_input
          data_type: S3Uri
  testing:
    step_type: RiskTableMapping_Testing
    spec:
      dependencies:
        input_data:
          semantic_keywords:
          - testing
          - test
          - data
          - input
          - preprocessed
          - tabular
          - processed_data
        model_artifacts_input:
          required: true
          compatible_sources:
          - RiskTableMapping_Training
      outputs:
        processed_data:
          type: processing_output
          property_path: properties.ProcessingOutputConfig.Outputs['processed_data'].S3Output.S3Uri
          aliases:
          - testing_data
          - model_testing_data
          - data_input
          - input_data
          - input_path
          data_type: S3Uri
        model_artifacts_output:
          type: processing_output
          property_path: properties.ProcessingOutputConfig.Outputs['model_artifacts_output'].S3Output.S3Uri
          aliases:
          - risk_tables
          - bin_mapping
          - risk_table_artifacts
          - categorical_mappings
          - risk_tables_input
          - model_artifacts_input
          data_type: S3Uri
  calibration:
    step_type: RiskTableMapping_Calibration
    spec:
      dependencies:
        input_data:
          semantic_keywords:
          - calibration
          - calib
          - data
          - input
          - preprocessed
          - tabular
          - processed_data
        model_artifacts_input:
          required: true
          compatible_sources:
          - RiskTableMapping_Training
      outputs:
        processed_data:
          type: processing_output
          property_path: properties.ProcessingOutputConfig.Outputs['processed_data'].S3Output.S3Uri
          aliases:
          - calibration_data
          - model_calibration_data
          - data_input
          - input_data
          - input_path
          data_type: S3Uri
        model_artifacts_output:
          type: processing_output
          property_path: properties.ProcessingOutputConfig.Outputs['model_artifacts_output'].S3Output.S3Uri
          aliases:
          - risk_tables
          - risk_tables_output
          - bin_mapping
          - risk_table_artifacts
          - categorical_mappings
          - risk_tables_input
          - model_artifacts_input
          data_type: S3Uri
