step_type: RedshiftDataLoading
node_type: source
registry:
  sagemaker_step_type: RedshiftDataLoading
  requires: secure_ai_sandbox_workflow_python_sdk  # create_step: builder imports RedshiftDataLoadingStep at module level (hard, fatal-on-load if SDK absent)
  description: Redshift SQL data loading step (source node with optional EDX upload)
contract:
  entry_point: redshift_data_loading.py
  runtime_requires: [secure_ai_sandbox_python_lib]  # runtime: script imports secure_ai_sandbox_python_lib.session.Session (in-container only, NOT a build-time dep)
  inputs: {}
  outputs:
    output:
      path: /opt/ml/processing/output/data
  arguments: {}
  env_vars:
    required: []
    optional: {}
  framework_requirements:
    boto3: '>=1.26.0'
    pandas: '>=1.2.0'
  description: 'Redshift data loading script. Source node that executes SQL against
    Redshift and writes results as CSV to S3. Optionally uploads to EDX as side effect.

    '
spec:
  dependencies: {}
  outputs:
    output:
      type: processing_output
      property_path: properties.ProcessingOutputConfig.Outputs['output'].S3Output.S3Uri
      semantic_keywords:
      - data
      - output
      - redshift
      - sql
      - query_results
      aliases:
      - DATA
      - input_data
      - input_path
      - processed_data
      - redshift_output
      - sql_output
      - training_data
      data_type: S3Uri
