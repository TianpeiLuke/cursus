step_type: Package
node_type: internal
registry:
  sagemaker_step_type: Processing
  description: Model packaging step
compute:
  kind: sklearn
  framework_version_field: processing_framework_version
  framework_version_default: 1.0-1
contract:
  input_source_overrides:
    inference_scripts_input: inference_scripts_source
  include_job_type_in_path: false
  entry_point: package.py
  inputs:
    model_input:
      path: /opt/ml/processing/input/model
      required: true
    inference_scripts_input:
      path: /opt/ml/processing/input/script
      required: false
    calibration_model:
      path: /opt/ml/processing/input/calibration
      required: false
  outputs:
    packaged_model:
      path: /opt/ml/processing/output
  arguments: {}
  env_vars:
    required: []
    optional:
      WORKING_DIRECTORY: /tmp/mims_packaging_directory
  framework_requirements:
    python: '>=3.7'
  description: 'MIMS packaging script that extracts model artifacts, includes calibration
    model if available, copies inference scripts, and creates a packaged model.tar.gz
    for deployment.

    '
spec:
  dependencies:
    model_input:
      type: model_artifacts
      required: true
      compatible_sources:
      - XGBoostTraining
      - TrainingStep
      - ModelStep
      - PyTorchTraining
      semantic_keywords:
      - model
      - artifacts
      - trained
      - output
      - ModelArtifacts
    inference_scripts_input:
      type: custom_property
      required: false
      compatible_sources:
      - ProcessingStep
      - ScriptStep
      semantic_keywords:
      - inference
      - scripts
      - code
      - InferenceScripts
    calibration_model:
      type: processing_output
      required: false
      compatible_sources:
      - ModelCalibration
      - PercentileModelCalibration
      semantic_keywords:
      - calibration
      - calibration_model
      - calibrator
      - probability
      - calibrated
  outputs:
    packaged_model:
      type: model_artifacts
      property_path: properties.ProcessingOutputConfig.Outputs['packaged_model'].S3Output.S3Uri
      semantic_keywords:
      - packaged
      - model
      - deployment
      - tar
      aliases:
      - PackagedModel
      - model_data
      data_type: S3Uri
