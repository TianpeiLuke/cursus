step_type: MissingValueImputation
node_type: internal
registry:
  sagemaker_step_type: Processing
  description: Missing value imputation step using statistical methods (mean, median, mode, constant) with pandas-safe values
patterns:
  direct_input_keys: [data_input, imputation_params_input, processed_data]
compute:
  kind: sklearn
  framework_version_field: processing_framework_version
contract:
  entry_point: missing_value_imputation.py
  inputs:
    input_data:
      path: /opt/ml/processing/input/data
      required: true
    model_artifacts_input:
      path: /opt/ml/processing/input/model_artifacts
      required: false
  outputs:
    processed_data:
      path: /opt/ml/processing/output/data
    model_artifacts_output:
      path: /opt/ml/processing/output/model_artifacts
  arguments: {}
  job_arguments:
  - flag: --job_type
    source: job_type
  env_vars:
    required: []
    optional:
      DEFAULT_NUMERICAL_STRATEGY: mean
      DEFAULT_CATEGORICAL_STRATEGY: mode
      LABEL_FIELD: target
      DEFAULT_TEXT_STRATEGY: mode
      NUMERICAL_CONSTANT_VALUE: '0'
      CATEGORICAL_CONSTANT_VALUE: Unknown
      TEXT_CONSTANT_VALUE: Unknown
      CATEGORICAL_PRESERVE_DTYPE: 'true'
      AUTO_DETECT_CATEGORICAL: 'true'
      CATEGORICAL_UNIQUE_RATIO_THRESHOLD: '0.1'
      VALIDATE_FILL_VALUES: 'true'
      EXCLUDE_COLUMNS: ''
      ENABLE_TRUE_STREAMING: 'false'
      MAX_WORKERS: '0'
  framework_requirements:
    pandas: '>=1.3.0'
    numpy: '>=1.21.0'
    scikit-learn: '>=1.0.0'
  description: 'Missing value imputation script. Handles missing values using statistical
    methods (mean, median, mode, constant). Training mode fits imputers; inference
    applies pre-fitted. Per-column strategies can also be supplied dynamically via
    COLUMN_STRATEGY_<column_name> environment variables (discovered at runtime, not
    pre-declared).

    '
spec:
  dependencies:
    input_data:
      type: processing_output
      required: true
      compatible_sources:
      - TabularPreprocessing
      - StratifiedSampling
      - RiskTableMapping
      - ProcessingStep
      semantic_keywords:
      - processed_data
      - preprocessed
      - cleaned
      - tabular
      - data
      - input
      - dataset
      - missing_values
      - imputation
    model_artifacts_input:
      type: processing_output
      required: false
      compatible_sources:
      - MissingValueImputation_Training
      - ProcessingStep
      semantic_keywords:
      - model_artifacts
      - imputation_parameters
      - fitted_imputers
      - imputation_artifacts
      - imputation_model
      - training_artifacts
  outputs:
    processed_data:
      type: processing_output
      property_path: properties.ProcessingOutputConfig.Outputs['processed_data'].S3Output.S3Uri
      semantic_keywords:
      - imputed_data
      - cleaned_data
      - filled_data
      - model_input_data
      aliases:
      - data_input
      - input_data
      - imputed_data
      - cleaned_data
      - filled_data
      - training_data
      - model_input_data
      - input_path
      data_type: S3Uri
    model_artifacts_output:
      type: processing_output
      property_path: properties.ProcessingOutputConfig.Outputs['model_artifacts_output'].S3Output.S3Uri
      semantic_keywords:
      - imputation_params
      - fitted_imputers
      - imputation_model
      aliases:
      - imputation_params
      - imputation_parameters
      - fitted_imputers
      - imputation_artifacts
      - imputation_model
      - model_artifacts
      - model_artifacts_input
      data_type: S3Uri
variants:
  training:
    step_type: MissingValueImputation_Training
    spec:
      dependencies:
        input_data:
          semantic_keywords:
          - training
          - train
          - processed_data
          - preprocessed
          - tabular
          - data
          - input
          - missing_values
        model_artifacts_input:
          required: false
      outputs:
        processed_data:
          type: processing_output
          property_path: properties.ProcessingOutputConfig.Outputs['processed_data'].S3Output.S3Uri
          aliases:
          - imputed_data
          - cleaned_data
          - filled_data
          - training_data
          - model_input_data
          - input_path
          - input_data
          - data_input
          - data_output
          data_type: S3Uri
        model_artifacts_output:
          type: processing_output
          property_path: properties.ProcessingOutputConfig.Outputs['model_artifacts_output'].S3Output.S3Uri
          aliases:
          - model_artifacts
          - imputation_params
          - imputation_parameters
          - fitted_imputers
          - imputation_artifacts
          - imputation_model
          - training_artifacts
          - imputation_params_input
          - imputation_params_output
          - model_artifacts_input
          data_type: S3Uri
  validation:
    step_type: MissingValueImputation_Validation
    spec:
      dependencies:
        input_data:
          semantic_keywords:
          - validation
          - val
          - processed_data
          - preprocessed
          - tabular
          - data
          - input
          - missing_values
        model_artifacts_input:
          required: true
      outputs:
        processed_data:
          type: processing_output
          property_path: properties.ProcessingOutputConfig.Outputs['processed_data'].S3Output.S3Uri
          aliases:
          - imputed_data
          - input_data
          - cleaned_data
          - filled_data
          - validation_data
          - model_input_data
          - input_path
          - data_input
          data_type: S3Uri
        model_artifacts_output:
          type: processing_output
          property_path: properties.ProcessingOutputConfig.Outputs['model_artifacts_output'].S3Output.S3Uri
          aliases:
          - imputation_params
          - imputation_parameters
          - fitted_imputers
          - imputation_artifacts
          - imputation_model
          - training_artifacts
          - imputation_params_input
          - model_artifacts_input
          data_type: S3Uri
  testing:
    step_type: MissingValueImputation_Testing
    spec:
      dependencies:
        input_data:
          semantic_keywords:
          - testing
          - test
          - processed_data
          - preprocessed
          - tabular
          - data
          - input
          - missing_values
        model_artifacts_input:
          required: true
      outputs:
        processed_data:
          type: processing_output
          property_path: properties.ProcessingOutputConfig.Outputs['processed_data'].S3Output.S3Uri
          aliases:
          - imputed_data
          - input_data
          - cleaned_data
          - filled_data
          - testing_data
          - test_data
          - model_input_data
          - input_path
          - data_input
          data_type: S3Uri
        model_artifacts_output:
          type: processing_output
          property_path: properties.ProcessingOutputConfig.Outputs['model_artifacts_output'].S3Output.S3Uri
          aliases:
          - imputation_params
          - imputation_parameters
          - fitted_imputers
          - imputation_artifacts
          - imputation_model
          - training_artifacts
          - imputation_params_input
          - model_artifacts_input
          data_type: S3Uri
  calibration:
    step_type: MissingValueImputation_Calibration
    spec:
      dependencies:
        input_data:
          semantic_keywords:
          - calibration
          - calib
          - processed_data
          - preprocessed
          - tabular
          - data
          - input
          - missing_values
        model_artifacts_input:
          required: true
      outputs:
        processed_data:
          type: processing_output
          property_path: properties.ProcessingOutputConfig.Outputs['processed_data'].S3Output.S3Uri
          aliases:
          - imputed_data
          - input_data
          - cleaned_data
          - filled_data
          - calibration_data
          - calib_data
          - model_input_data
          - input_path
          - data_input
          data_type: S3Uri
        model_artifacts_output:
          type: processing_output
          property_path: properties.ProcessingOutputConfig.Outputs['model_artifacts_output'].S3Output.S3Uri
          aliases:
          - imputation_params
          - imputation_parameters
          - fitted_imputers
          - imputation_artifacts
          - imputation_model
          - training_artifacts
          - imputation_params_input
          - model_artifacts_input
          data_type: S3Uri
