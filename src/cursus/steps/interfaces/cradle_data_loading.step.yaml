step_type: CradleDataLoading
node_type: source
registry:
  sagemaker_step_type: CradleDataLoading
  requires: secure_ai_sandbox_workflow_python_sdk  # create_step: builder imports CradleDataLoadingStep at module level (hard, fatal-on-load if SDK absent)
  description: Cradle data loading step
contract:
  entry_point: scripts.py
  inputs: {}
  outputs:
    SIGNATURE:
      path: /opt/ml/processing/output/signature
    METADATA:
      path: /opt/ml/processing/output/metadata
    DATA:
      path: /opt/ml/processing/output/place_holder
  arguments: {}
  env_vars:
    required: []
    optional:
      OUTPUT_PATH: ''
  framework_requirements:
    python: '>=3.7'
  description: 'Cradle data loading script that reads config, writes output signature/metadata,
    creates and executes a Cradle data load job, and waits for completion. Data is
    loaded directly to S3 by the Cradle service.

    '
spec:
  dependencies: {}
  outputs:
    DATA:
      type: processing_output
      property_path: properties.ProcessingOutputConfig.Outputs['DATA'].S3Output.S3Uri
      semantic_keywords:
      - data
      - input
      - raw
      - dataset
      - source
      aliases:
      - input_data
      - training_data
      - processed_data
      data_type: S3Uri
    METADATA:
      type: processing_output
      property_path: properties.ProcessingOutputConfig.Outputs['METADATA'].S3Output.S3Uri
      semantic_keywords:
      - metadata
      - schema
      - info
      - description
      data_type: S3Uri
    SIGNATURE:
      type: processing_output
      property_path: properties.ProcessingOutputConfig.Outputs['SIGNATURE'].S3Output.S3Uri
      semantic_keywords:
      - signature
      - schema
      - columns
      aliases:
      - schema
      data_type: S3Uri
