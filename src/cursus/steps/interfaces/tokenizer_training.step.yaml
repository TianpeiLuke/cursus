step_type: TokenizerTraining
node_type: internal
registry:
  sagemaker_step_type: Processing
  description: BPE tokenizer training step for customer name data with automatic vocabulary size tuning
patterns:
  step_assembly: step_args
compute:
  kind: framework
  sdk_class: PyTorch
  framework_version_field: framework_version
  py_version_field: py_version
contract:
  include_job_type_in_path: false
  entry_point: tokenizer_training.py
  source_dir: true
  inputs:
    input_data:
      path: /opt/ml/processing/input
      required: true
  outputs:
    model_artifacts_output:
      path: /opt/ml/processing/output
  arguments: {}
  job_arguments:
  - flag: --job_type
    source: job_type
  env_vars:
    required:
    - TEXT_FIELD
    optional:
      TARGET_COMPRESSION: '2.5'
      MIN_FREQUENCY: '25'
      MAX_VOCAB_SIZE: '50000'
      USE_SECURE_PYPI: 'true'
  framework_requirements:
    pandas: '>=1.3.0'
    tokenizers: '>=0.13.0'
  description: 'Tokenizer training script. Trains custom BPE tokenizer optimized for
    customer name data with automatic vocabulary size tuning.

    '
spec:
  dependencies:
    input_data:
      type: processing_output
      required: true
      compatible_sources:
      - TabularPreprocessing
      - ProcessingStep
      semantic_keywords:
      - input_data
      - training_data
      - train
      - processed_data
      - text_data
      - tokenizer_input
      - training
      - preprocessed
  outputs:
    model_artifacts_output:
      type: processing_output
      property_path: properties.ProcessingOutputConfig.Outputs['model_artifacts_output'].S3Output.S3Uri
      semantic_keywords:
      - tokenizer
      - bpe_tokenizer
      - trained_tokenizer
      - tokenizer_artifacts
      aliases:
      - tokenizer_output
      - tokenizer_artifacts
      - tokenizer
      - bpe_tokenizer
      - trained_tokenizer
      - tokenizer_model
      - model_artifacts_input
      data_type: S3Uri
