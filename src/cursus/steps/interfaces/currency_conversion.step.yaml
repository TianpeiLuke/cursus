step_type: CurrencyConversion
node_type: internal
registry:
  sagemaker_step_type: Processing
  description: Currency conversion processing step
patterns:
  direct_input_keys: [data_input]
compute:
  kind: sklearn
  framework_version_field: processing_framework_version
contract:
  entry_point: currency_conversion.py
  inputs:
    input_data:
      path: /opt/ml/processing/input/data
      required: true
  outputs:
    processed_data:
      path: /opt/ml/processing/output
  arguments: {}
  job_arguments:
  - flag: --job_type
    source: job_type
  env_vars:
    required: []
    optional:
      CURRENCY_CODE_FIELD: ''
      MARKETPLACE_ID_FIELD: ''
      DEFAULT_CURRENCY: USD
      N_WORKERS: '50'
      CURRENCY_CONVERSION_VARS: '[]'
      CURRENCY_CONVERSION_DICT: '{}'
  framework_requirements:
    pandas: '>=1.3.0'
    numpy: '>=1.21.0'
  description: 'Currency conversion script. Converts monetary values across currencies
    based on marketplace information and exchange rates.

    '
spec:
  dependencies:
    input_data:
      type: processing_output
      required: true
      compatible_sources:
      - TabularPreprocessing
      - ProcessingStep
      - CradleDataLoading
      - MissingValueImputation
      - RiskTableMapping
      - StratifiedSampling
      - FeatureSelection
      semantic_keywords:
      - input_data
      - processed_data
      - data
      - processed
      - tabular
      - currency
      - monetary
      - conversion
  outputs:
    processed_data:
      type: processing_output
      property_path: properties.ProcessingOutputConfig.Outputs['processed_data'].S3Output.S3Uri
      semantic_keywords:
      - converted_data
      - currency_converted
      - processed
      aliases:
      - input_data
      - input_path
      data_type: S3Uri
