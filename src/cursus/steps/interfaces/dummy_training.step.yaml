step_type: DummyTraining
node_type: internal
registry:
  sagemaker_step_type: Processing
  description: Training step that uses a pretrained model
patterns:
  step_assembly: step_args
compute:
  kind: framework                    # FrameworkProcessor(estimator_cls=SKLearn) — source_dir support
  sdk_class: SKLearn
  framework_version_field: processing_framework_version
contract:
  entry_point: dummy_training.py
  source_dir: true
  inputs:
    model_artifacts_input:
      path: /opt/ml/processing/input/model_artifacts_input
      required: false
    hyperparameters_s3_uri:
      path: /opt/ml/processing/input/hyperparameters_s3_uri
      required: false
  outputs:
    model_output:
      path: /opt/ml/processing/output/model
  arguments: {}
  env_vars:
    required: []
    optional: {}
  framework_requirements:
    python: '>=3.7'
  description: 'Dummy training step with flexible input modes. Adds hyperparameters.json
    to model.tar.gz for downstream packaging. Supports INTERNAL mode (accepts inputs)
    or SOURCE mode (reads from source directory).

    '
spec:
  dependencies:
    hyperparameters_s3_uri:
      type: hyperparameters
      required: false
      compatible_sources:
      - HyperparameterPrep
      - ProcessingStep
      semantic_keywords:
      - config
      - params
      - hyperparameters
      - settings
      - hyperparams
    model_artifacts_input:
      type: model_artifacts
      required: false
      compatible_sources:
      - PyTorchTraining
      - XGBoostTraining
      - LightGBMTraining
      - ProcessingStep
      semantic_keywords:
      - model
      - artifacts
      - model_artifacts
      - pretrained
      - trained_model
      - model_output
  outputs:
    model_output:
      type: model_artifacts
      property_path: properties.ProcessingOutputConfig.Outputs['model_output'].S3Output.S3Uri
      semantic_keywords:
      - model
      - artifacts
      - model_data
      aliases:
      - ModelOutputPath
      - ModelArtifacts
      - model_data
      - output_path
      - model_input
      data_type: S3Uri
