step_type: LightGBMModelInference
node_type: internal
registry:
  sagemaker_step_type: Processing
  description: LightGBM model inference step for prediction generation without metrics
patterns:
  step_assembly: step_args
  include_job_type_in_path: false
compute:
  kind: framework
  sdk_class: PyTorch
  framework_version_field: framework_version
  py_version_field: py_version
contract:
  entry_point: lightgbm_model_inference.py
  inputs:
    model_input:
      path: /opt/ml/processing/input/model
      required: true
    processed_data:
      path: /opt/ml/processing/input/eval_data
      required: true
  outputs:
    eval_output:
      path: /opt/ml/processing/output/eval
  arguments: {}
  job_arguments:
  - flag: --job_type
    source: job_type
  env_vars:
    required: []
    optional:
      OUTPUT_FORMAT: csv
      JSON_ORIENT: records
      ID_FIELD: id
      LABEL_FIELD: label
  framework_requirements:
    pandas: '>=1.3.0'
    numpy: '>=1.21.0'
    lightgbm: '>=3.3.0'
  description: 'LightGBM model inference script. Loads trained model, preprocesses
    evaluation data, generates predictions without metrics computation.

    '
spec:
  dependencies:
    model_input:
      type: model_artifacts
      required: true
      compatible_sources:
      - LightGBMTraining
      - XGBoostTraining
      - PyTorchTraining
      - DummyTraining
      - LightGBMModel
      - XGBoostModel
      - PyTorchModel
      semantic_keywords:
      - model
      - artifacts
      - trained
      - output
      - ModelArtifacts
      - lightgbm
      - training
    processed_data:
      type: processing_output
      required: true
      compatible_sources:
      - TabularPreprocessing
      - CradleDataLoading
      - RiskTableMapping
      - CurrencyConversion
      semantic_keywords:
      - data
      - evaluation
      - calibration
      - validation
      - test
      - processed
      - inference
      - input
  outputs:
    eval_output:
      type: processing_output
      property_path: properties.ProcessingOutputConfig.Outputs['eval_output'].S3Output.S3Uri
      semantic_keywords:
      - inference
      - predictions
      - model_predictions
      aliases:
      - inference_output
      - predictions
      - model_predictions
      - inference_results
      - prediction_data
      - evaluation_data
      data_type: S3Uri
